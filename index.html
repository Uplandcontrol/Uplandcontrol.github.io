<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>슬기로운 방제생활</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F4F5F8;
    --panel: #FFFFFF;
    --ink: #14161F;
    --ink-soft: #666B7A;
    --ink-faint: #9297A6;
    --forest: #4F46E5;       /* primary accent (indigo) */
    --forest-dark: #4338CA;  /* primary hover/active */
    --sage: #8286B0;         /* muted secondary accent */
    --mustard: #D97706;
    --mustard-soft: #FEF3C7;
    --success: #16A34A;
    --success-soft: #DCFCE7;
    --danger: #DC2626;
    --danger-soft: #FEE2E2;
    --line: #E4E6ED;
    --radius: 12px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter','Noto Sans KR', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:28px 20px 80px;}
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:24px;
  }
  .brand{display:flex;align-items:center;gap:11px;}
  .brand .leaf{
    width:36px;height:36px;border-radius:10px;background:var(--forest);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;
    box-shadow:0 4px 10px rgba(79,70,229,.28);
  }
  .brand h1{font-family:'Inter','Noto Sans KR',sans-serif;font-weight:800;font-size:18px;margin:0;color:var(--ink);letter-spacing:-.01em;}
  .brand .sub{font-size:12px;color:var(--ink-faint);margin-top:2px;font-weight:500;}
  .who{font-size:13px;color:var(--ink-soft);display:flex;align-items:center;gap:10px;}
  .who button{
    border:1px solid var(--line);background:var(--panel);border-radius:8px;
    padding:6px 12px;font-size:12px;cursor:pointer;color:var(--ink-soft);
  }
  .who button:hover{border-color:var(--forest);color:var(--forest);}

  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px;margin-bottom:16px;
    box-shadow:0 1px 2px rgba(20,22,31,.04);
  }
  .card h2{
    font-family:'Inter','Noto Sans KR',sans-serif;font-weight:700;font-size:15.5px;margin:0 0 4px;color:var(--ink);letter-spacing:-.005em;
  }
  .card .desc{font-size:13px;color:var(--ink-soft);margin-bottom:16px;}

  /* landing */
  .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:6px;}
  @media (max-width:560px){.role-grid{grid-template-columns:1fr;}}
  .role-btn{
    border:1.5px solid var(--line);background:var(--panel);border-radius:var(--radius);
    padding:22px 18px;cursor:pointer;text-align:left;transition:.15s;
  }
  .role-btn:hover{border-color:var(--forest);transform:translateY(-2px);}
  .role-btn .icon{font-size:24px;margin-bottom:8px;display:block;}
  .role-btn .title{font-weight:700;font-size:15px;color:var(--ink);margin-bottom:4px;}
  .role-btn .d{font-size:12.5px;color:var(--ink-soft);line-height:1.5;}

  input[type=text], input[type=date], select, textarea{
    width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 12px;
    font-family:inherit;font-size:14px;background:#FBFBFD;color:var(--ink);
    transition:border-color .12s, box-shadow .12s;
  }
  input[type=text]:focus, input[type=date]:focus, select:focus, textarea:focus{
    outline:none;border-color:var(--forest);box-shadow:0 0 0 3px rgba(79,70,229,.14);
  }
  label{font-size:12.5px;color:var(--ink-soft);font-weight:600;display:block;margin-bottom:6px;}
  .field{margin-bottom:14px;}
  .btn{
    border:none;border-radius:8px;padding:10px 17px;font-size:13.5px;font-weight:600;
    cursor:pointer;font-family:inherit;
  }
  .btn-primary{background:var(--forest);color:#fff;}
  .btn-primary:hover{background:var(--forest-dark);}
  .btn-primary:disabled{background:#C7C9E6;cursor:not-allowed;}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink-soft);}
  .btn-ghost:hover{border-color:var(--forest);color:var(--forest);}

  .crop-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
  .crop-chip{
    border:1.5px solid var(--line);background:#FBFBFD;border-radius:8px;
    padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink-soft);
    transition:.12s;
  }
  .crop-chip.active{border-color:var(--forest);background:var(--forest);color:#fff;}

  .pest-list{
    display:flex;flex-direction:column;gap:7px;margin-top:10px;
    max-height:520px;overflow-y:auto;padding-right:4px;
  }
  .pest-list::-webkit-scrollbar{width:7px;}
  .pest-list::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;}
  .pest-list::-webkit-scrollbar-thumb:hover{background:var(--sage);}
  .pest-item{
    display:flex;justify-content:space-between;align-items:center;
    border:1px solid var(--line);border-radius:9px;padding:11px 13px;cursor:pointer;background:#fff;
    transition:.12s;
  }
  .pest-item:hover{border-color:var(--forest);}
  .pest-item.active{border-color:var(--forest);background:#EEF0FE;}
  .pest-item.no-stock{background:#F8F9FB;}
  .pest-item.no-stock .name{color:var(--ink-faint);font-weight:500;}
  .pest-item.no-stock.active{border-color:var(--sage);background:#F1F2F8;}
  .pest-item .name{font-weight:600;font-size:15px;}
  .pest-item .count{font-size:12px;color:var(--ink-soft);}
  .tag{
    font-size:11px;padding:2px 8px;border-radius:6px;font-weight:700;
  }
  .tag.ok{background:var(--success-soft);color:#166534;}
  .tag.low{background:var(--mustard-soft);color:#92400E;}
  .tag.none{background:var(--danger-soft);color:var(--danger);}

  .prod-card{
    border:1px solid var(--line);border-radius:11px;padding:16px;margin-bottom:12px;background:#fff;
  }
  .prod-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px;}
  .prod-name{font-size:15px;font-weight:700;color:var(--ink);}
  .crop-tag{
    display:inline-block;font-size:11px;font-weight:700;color:var(--forest-dark);
    background:#EEF0FE;border:1px solid #C7C9F5;border-radius:6px;
    padding:1px 9px;margin-left:8px;vertical-align:middle;
  }
  .prod-spec{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
  .moa-badge{
    display:inline-block; font-size:14px; font-weight:800;
    border-radius:7px; padding:3px 10px; margin-top:6px;
  }
  .stock-badge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px 18px;font-size:12.5px;color:var(--ink-soft);margin-bottom:12px;}
  .grid2 .warn-field{
    background:var(--danger-soft); border:1px solid #FCA5A5; border-radius:8px;
    padding:6px 8px; color:#7F1D1D; font-weight:700;
  }
  .grid2 .warn-field b{color:var(--danger);}
  .grid2 .caution-field{
    background:var(--mustard-soft); border:1px solid #FCD34D; border-radius:8px;
    padding:6px 8px; color:#78350F; font-weight:700;
  }
  .grid2 .caution-field b{color:#B45309;}
  .grid2 b{color:var(--ink);font-weight:600;}
  .grid2 .full{grid-column:1/-1;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{
    text-align:left;font-size:11px;color:var(--ink-faint);text-transform:uppercase;
    letter-spacing:.04em;padding:8px 10px;border-bottom:2px solid var(--line);font-weight:700;
  }
  td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top;}
  tr:last-child td{border-bottom:none;}
  .status-badge{font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:6px;display:inline-block;}
  .status-대기{background:var(--mustard-soft);color:#92400E;}
  .status-처리중{background:#DBEAFE;color:#1D4ED8;}
  .status-완료{background:var(--success-soft);color:#166534;}
  select.status-select{width:auto;padding:6px 8px;font-size:12.5px;}

  .empty{text-align:center;padding:34px 10px;color:var(--ink-soft);font-size:13.5px;}
  .empty .big{font-size:30px;margin-bottom:8px;}

  .modal-bg{
    position:fixed;inset:0;background:rgba(20,22,31,.45);display:flex;align-items:center;
    justify-content:center;padding:20px;z-index:50;
  }
  .modal{background:#fff;border-radius:14px;padding:24px;max-width:420px;width:100%;}
  .modal h3{font-family:'Inter','Noto Sans KR',sans-serif;font-weight:700;margin:0 0 4px;font-size:16px;color:var(--ink);}
  .modal .sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:16px;}
  .modal-actions{display:flex;gap:10px;margin-top:18px;}
  .modal-actions .btn{flex:1;}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:12px 20px;border-radius:9px;
    font-size:13.5px;box-shadow:0 10px 30px rgba(20,22,31,.25);z-index:60;
    max-width:min(90vw,520px);word-break:break-word;
  }
  .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .filter-chip{
    border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 14px;
    font-size:12.5px;cursor:pointer;color:var(--ink-soft);font-weight:600;
  }
  .filter-chip.active{border-color:var(--forest);background:var(--forest);color:#fff;}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--success);display:inline-block;margin-right:5px;
    animation:pulse 1.6s infinite;}
  @keyframes pulse{0%{opacity:1;}50%{opacity:.35;}100%{opacity:1;}}
  .section-label{font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--ink-faint);text-transform:uppercase;margin-bottom:6px;}

  .side-grid{display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start;}
  .side-grid .sticky-col{position:sticky;top:20px;}
  @media (max-width:820px){
    .side-grid{grid-template-columns:1fr;}
    .side-grid .sticky-col{position:static;}
  }
  .placeholder-card{
    border:1.5px dashed var(--line);border-radius:var(--radius);padding:40px 20px;
    text-align:center;color:var(--ink-soft);font-size:13.5px;background:#FAFAFC;
  }
  .placeholder-card .big{font-size:32px;margin-bottom:10px;}

  .mix-section{border-top:1px solid var(--line);padding-top:12px;margin-top:4px;}
  .mix-section-label{font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--ink-faint);text-transform:uppercase;margin-bottom:10px;}
  .mix-group{margin-bottom:12px;}
  .mix-group:last-child{margin-bottom:0;}
  .mix-group-head{display:flex;align-items:center;gap:6px;margin-bottom:7px;}
  .mix-group-head .dot{width:8px;height:8px;border-radius:50%;}
  .mix-group-head .label{font-size:11.5px;font-weight:700;color:var(--ink-soft);}
  .mix-items{display:flex;flex-direction:column;gap:6px;}
  .mix-item{
    border:1px solid var(--line);border-radius:9px;padding:8px 11px;background:#FAFAFC;
  }
  .mix-item.instock{border-color:var(--success);background:var(--success-soft);}
  .mix-item.instock-other{border-color:#3B82F6;background:#EFF6FF;}
  .mix-item.instock-other .mix-name{color:#1D4ED8;font-weight:700;}
  .mix-item.instock-other .stock-dot{background:#3B82F6;}
  .mix-item-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
  .mix-item .stock-dot{width:7px;height:7px;border-radius:50%;background:var(--success);flex-shrink:0;}
  .mix-name{font-size:13px;font-weight:600;color:var(--ink-soft);}
  .mix-item.instock .mix-name{color:#166534;font-weight:700;}
  .mix-form{font-size:11px;color:var(--ink-soft);background:#EEEFF3;border-radius:5px;padding:1px 6px;}
  .mix-usage{font-size:11px;font-weight:700;color:var(--forest);}
  .mix-targets{font-size:11.5px;color:var(--ink-soft);margin-top:3px;}
  .mix-note{font-size:11.5px;color:var(--ink-soft);margin-top:2px;font-style:italic;}

  .filter-dropdown-btn{
    display:flex;align-items:center;gap:5px;border:1px solid var(--line);background:#FBFBFD;
    border-radius:8px;padding:6px 11px;font-size:12px;font-weight:600;color:var(--ink-soft);
    cursor:pointer;white-space:nowrap;
  }
  .filter-dropdown-btn:hover{border-color:var(--forest);color:var(--forest);}
  .filter-dropdown-btn .caret{font-size:10px;}
  .dropdown-overlay{position:fixed;inset:0;z-index:35;}
  .filter-dropdown-panel{
    position:absolute;top:calc(100% + 6px);right:0;z-index:40;width:230px;
    background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px;
    box-shadow:0 12px 32px rgba(20,22,31,.16);
  }
  .filter-dropdown-actions{display:flex;gap:6px;margin-bottom:8px;}
  .filter-dropdown-actions button{
    flex:1;border:1px solid var(--line);background:#FAFAFC;border-radius:7px;
    padding:5px 6px;font-size:11.5px;cursor:pointer;color:var(--ink-soft);
  }
  .filter-dropdown-actions button:hover{border-color:var(--forest);color:var(--forest);}
  .filter-dropdown-list{max-height:220px;overflow-y:auto;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:4px 0;margin-bottom:8px;}
  .filter-check-item{display:flex;align-items:center;gap:8px;padding:5px 4px;font-size:12.5px;cursor:pointer;border-radius:5px;}
  .filter-check-item:hover{background:#F4F5FA;}
  .filter-check-item input{width:auto;margin:0;accent-color:var(--forest);}
  .filter-dropdown-apply{width:100%;padding:8px;font-size:12.5px;}

  .data-panel{margin-bottom:16px;}
  .data-panel-toggle{
    width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;
    background:transparent;border:1px dashed var(--line);border-radius:9px;
    padding:7px 12px;font-size:11.5px;color:var(--ink-faint);cursor:pointer;font-family:inherit;
  }
  .data-panel-toggle:hover{border-color:var(--forest);color:var(--ink-soft);}
  .data-panel-toggle .data-panel-summary{flex:1;text-align:right;font-size:11px;color:var(--ink-faint);}
  .data-panel-toggle .caret{font-size:10px;}
  .data-panel-body{
    border:1px solid var(--line);border-top:none;border-radius:0 0 9px 9px;
    padding:16px;background:#FAFAFC;
  }
  .data-sub-section{padding:10px 0;border-top:1px solid var(--line);}
  .data-sub-section:first-child{border-top:none;padding-top:2px;}

  .detail-toggle{
    border:none;background:transparent;color:var(--forest);font-size:12px;font-weight:700;
    cursor:pointer;padding:4px 0;font-family:inherit;
  }
  .detail-toggle:hover{color:var(--forest-dark);text-decoration:underline;}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = "https://exixxzgylqymxoevgqet.supabase.co";
const SUPABASE_KEY = "sb_publishable_vV96sOBB37HCipC_ol_Nrg_vtfKUFSm";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function fetchAllRows(table){
  const pageSize = 1000;
  let from = 0;
  let all = [];
  while(true){
    const {data, error} = await sb.from(table).select('*').range(from, from + pageSize - 1);
    if(error){ console.error(table, error); break; }
    all = all.concat(data);
    if(data.length < pageSize) break;
    from += pageSize;
  }
  return all;
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const {useState, useEffect, useMemo, useCallback} = React;

const CROPS = ["콩","녹두","참깨","들깨"];
const CROP_COLORS = {
  '콩':      {bg:'#DBEAFE', border:'#3B82F6', color:'#1D4ED8'},
  '들깨':    {bg:'#CCFBF1', border:'#0D9488', color:'#0F766E'},
  '참깨':    {bg:'#FEF3C7', border:'#D97706', color:'#92400E'},
  '녹두':    {bg:'#F3E8FF', border:'#9333EA', color:'#7E22CE'},
};
const norm = s => String(s||'').trim().replace(/[\s\-]/g,'');
const baseName = s => String(s||'').trim().replace(/[\(（].*?[\)）]\s*$/,'').trim();

function StockBadge({qty, unit}){
  const cls = qty<=0 ? 'none' : 'ok';
  const label = qty<=0 ? '재고 없음' : `재고 ${qty}${unit}`;
  return <span className={`stock-badge tag ${cls}`}>{label}</span>;
}

function ToxicityBadge({value}){
  if(!value) return null;
  const v = String(value);
  let level = null;
  if(v.includes('맹독') || v.includes('고독성')) level = 'high';
  else if(v.includes('보통독성') || v.includes('Ⅱ급') || v.includes('Ⅲ급')) level = 'mid';
  else if(v.includes('저독성')) level = 'low';
  if(!level) return null;
  const style = {
    high: {background:'var(--danger-soft)', color:'var(--danger)', borderColor:'#FCA5A5'},
    mid:  {background:'var(--mustard-soft)', color:'#92400E', borderColor:'#FCD34D'},
    low:  {background:'var(--success-soft)', color:'#166534', borderColor:'#86EFAC'},
  }[level];
  const label = {high:'⚠ 고독성', mid:'△ 보통독성', low:'저독성'}[level];
  return <span className="tag" style={{...style, fontWeight:700, marginLeft:6}}>{label}</span>;
}

const MOA_PALETTE = [
  {background:'#DBEAFE', color:'#1D4ED8', border:'1px solid #93C5FD'},
  {background:'#FEF3C7', color:'#B45309', border:'1px solid #FCD34D'},
  {background:'#DCFCE7', color:'#15803D', border:'1px solid #86EFAC'},
  {background:'#F3E8FF', color:'#7E22CE', border:'1px solid #D8B4FE'},
  {background:'#FFE4E6', color:'#BE123C', border:'1px solid #FDA4AF'},
  {background:'#E0F2FE', color:'#0369A1', border:'1px solid #7DD3FC'},
  {background:'#FCE7F3', color:'#A21CAF', border:'1px solid #F0ABFC'},
  {background:'#ECFCCB', color:'#4D7C0F', border:'1px solid #BEF264'},
  {background:'#FFEDD5', color:'#C2410C', border:'1px solid #FDBA74'},
  {background:'#E0E7FF', color:'#4338CA', border:'1px solid #A5B4FC'},
  {background:'#F1F5F9', color:'#475569', border:'1px solid #CBD5E1'},
];

function moaStyle(code){
  if(!code) return MOA_PALETTE[MOA_PALETTE.length-1];
  let h = 0;
  for(let i=0;i<code.length;i++){ h = (h*31 + code.charCodeAt(i)) >>> 0; }
  return MOA_PALETTE[h % MOA_PALETTE.length];
}

function MoaBadge({value, small}){
  if(!value) return null;
  const smallStyle = small ? {fontSize:11, fontWeight:700, padding:'2px 8px', marginTop:0} : {};
  return <div className="moa-badge" style={{...moaStyle(value), ...smallStyle}}>작용기작 {value}</div>;
}

function Toast({msg, onDone}){
  useEffect(()=>{ const t=setTimeout(onDone, 6000); return ()=>clearTimeout(t); },[]);
  return <div className="toast">{msg}</div>;
}

function MixBadge({status}){
  const map = {
    '가능': {bg:'#E4EFDF', color:'var(--forest-dark)'},
    '불가': {bg:'#F2E1DB', color:'var(--danger)'},
    '제한적가능': {bg:'var(--mustard-soft)', color:'#92400E'},
  };
  const s = map[status] || {bg:'#EEE', color:'#666'};
  return <span className="tag" style={{background:s.bg, color:s.color}}>{status}</span>;
}

function App(){
  const [crop, setCrop] = useState(CROPS[0]);
  const [pest, setPest] = useState(null);
  const [checkedPests, setCheckedPests] = useState(new Set()); // 시작은 전체 해제 상태
  const [pestFilterOpen, setPestFilterOpen] = useState(false);
  const [pestFilterSearch, setPestFilterSearch] = useState('');
  const [inventory, setInventory] = useState([]);
  const [meta, setMeta] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [toast, setToast] = useState(null);
  const [expandedPest, setExpandedPest] = useState(new Set());
  const [expandedSearch, setExpandedSearch] = useState(new Set());
  const [expandedMix, setExpandedMix] = useState(new Set());
  const [comboMode, setComboMode] = useState(false);
  const [comboPestA, setComboPestA] = useState('');

      || registryData.find(r=> baseName(r.상표명)===productBase);

      note: logForm.note.trim(),

  function exportSprayLogCSV(){
    if(sprayLog.length===0) return;
    const rows = [['날짜','작물','농약','작용기작','메모']];
    [...sprayLog].sort((a,b)=> a.date.localeCompare(b.date)).forEach(e=>{
      rows.push([e.date, e.crop, e.product, e.moa||'', e.note||'']);
    });
    const csv = rows.map(r=> r.map(c=>{
      const s = String(c).replace(/"/g,'""');
      return /[",\n]/.test(s) ? `"${s}"` : s;
    }).join(',')).join('\r\n');
    const blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `방제기록_${todayStr()}.csv`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }

  function daysAgo(dateStr){
    const d = new Date(dateStr);
    const now = new Date();
    return Math.floor((now - d) / (1000*60*60*24));
  }

  const logEntriesByDate = useMemo(()=>{
    const map = {};
    sprayLog.forEach(e=>{
      if(!map[e.date]) map[e.date] = [];
      map[e.date].push(e);
    });
    return map;
  }, [sprayLog]);

  const logCalendarGrid = useMemo(()=>{
    const {year, month} = logCalendarMonth;
    const firstDay = new Date(year, month, 1);
    const startOffset = firstDay.getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const cells = [];
    for(let i=0;i<startOffset;i++) cells.push(null);
    for(let d=1; d<=daysInMonth; d++){
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      cells.push(dateStr);
    }
    return cells;
  }, [logCalendarMonth]);

  const recentMoaWarning = useMemo(()=>{
    if(!logForm.crop || !logForm.product.trim()) return null;
    const productBase = baseName(logForm.product.trim());
    const regRow = registryData.find(r=> baseName(r.상표명)===productBase && r.작물그룹===logForm.crop)
      || registryData.find(r=> baseName(r.상표명)===productBase);
    const moa = regRow ? regRow.작용기작 : '';
    if(!moa) return null;
    const recentSame = sprayLog.filter(e=>
      e.crop===logForm.crop && e.moa===moa && daysAgo(e.date) <= 45 &&

    );
    if(recentSame.length>0){
      return {moa, count: recentSame.length, examples: recentSame.slice(0,3).map(e=>e.product)};
    }
    return null;
  }, [logForm.crop, logForm.product, sprayLog, registryData]);

  const registryIndex = useMemo(()=>{
    const exact = new Map();
    registryData.forEach(r=>{
      if(!exact.has(r.상표명)) exact.set(r.상표명, []);
      exact.get(r.상표명).push(r);
    });
    const normMap = new Map();
    [...exact.keys()].forEach(b=>{
      const n = norm(b);
      if(!normMap.has(n)) normMap.set(n, []);
      normMap.get(n).push(b);
    });
    return {exact, normMap};
  }, [registryData]);

  const {matchedRows} = useMemo(()=>{
    const matched = [];
    const unmatched = [];
    inventory.forEach(item=>{
      const name = String(item.품명||'').trim();
      if(!name) return;
      let brandRows = registryIndex.exact.get(name);
      if(!brandRows){
        const candidates = registryIndex.normMap.get(norm(name)) || [];
        if(candidates.length===1){
          brandRows = registryIndex.exact.get(candidates[0]);
        }
      }
      if(brandRows){
        brandRows.forEach(r=> matched.push({
          ...r,
          재고_품명:item.품명, 재고_규격:item.규격, 재고_수량:Number(item.수량)||0,
          재고_단위:item.단위, 재고_보관장소:item.보관장소, 재고_유효기간:item.유효기간,
        }));
      } else {
        const candidates = registryIndex.normMap.get(norm(name)) || [];
        unmatched.push({...item, candidates});
      }
    });
    return {matchedRows: matched, unmatchedItems: unmatched};
  }, [inventory, registryIndex]);

  const cropRows = useMemo(()=> matchedRows.filter(r=>r.작물그룹===crop), [matchedRows, crop]);
  const [comboCrop, setComboCrop] = useState(CROPS[0]);
  const comboCropRows = useMemo(()=> matchedRows.filter(r=>r.작물그룹===comboCrop), [matchedRows, comboCrop]);

  const stockSet = useMemo(()=>
    new Set(inventory.filter(i=> Number(i.수량)>0).map(i=> baseName(i.품명))),
    [inventory]
  );

  const [searchQuery, setSearchQuery] = useState('');
  const searchResults = useMemo(()=>{
    const q = norm(searchQuery);
    if(!q) return [];
    const rows = matchedRows.filter(r=> norm(r.재고_품명).includes(q));
    const map = new Map();
    rows.forEach(r=>{
      const key = r.재고_품명 + '|' + r.작물그룹;
      if(!map.has(key)){
        map.set(key, {
          재고_품명:r.재고_품명, 작물그룹:r.작물그룹,
          재고_규격:r.재고_규격, 재고_수량:r.재고_수량, 재고_단위:r.재고_단위,
          재고_보관장소:r.재고_보관장소, 인축독성:r.인축독성, 작용기작:r.작용기작, 일반명:r.일반명,
          pestSet: new Set(), detailRows: [],
        });
      }
      const g = map.get(key);
      g.pestSet.add(r.적용병해충);
      g.detailRows.push(r);
    });
    return [...map.values()]
      .map(g=>({...g, pests:[...g.pestSet].sort((a,b)=>a.localeCompare(b))}))
      .sort((a,b)=> a.재고_품명.localeCompare(b.재고_품명) || a.작물그룹.localeCompare(b.작물그룹))

  const pestGroups = useMemo(()=>{

      map[r.적용병해충].push(r);

  const registryPestGroups = useMemo(()=>{

    }));

  const allPestNames = useMemo(()=> allPestEntries.map(e=>e.name), [allPestEntries]);
  const effectiveChecked = checkedPests;

  const comboPestGroups = useMemo(()=>{
    const map = {};
    comboCropRows.forEach(r=>{
      if(!map[r.적용병해충]) map[r.적용병해충] = [];
      map[r.적용병해충].push(r);

  const comboRegistryPestGroups = useMemo(()=>{
    const map = {};
    registryData.forEach(r=>{
      if(r.작물그룹 !== comboCrop) return;
      if(!map[r.적용병해충]) map[r.적용병해충] = [];
      map[r.적용병해충].push(r);
    });

  }, [comboCrop, registryData]);

  const comboAllPestNames = useMemo(()=>{
    const stockMap = new Map(comboPestGroups);

    return [...names].sort((a,b)=>a.localeCompare(b));

  function togglePestChecked(pname){
    setCheckedPests(prev=>{

      if(cur.has(pname)) cur.delete(pname); else cur.add(pname);
      return cur;

  useEffect(()=>{ setPest(null); setCheckedPests(new Set()); setPestFilterOpen(false); setPestFilterSearch(''); setComboMode(false); setComboPestA(''); setComboPestB(''); }, [crop]);
  useEffect(()=>{ setExpandedPest(new Set()); }, [pest, crop]);
  useEffect(()=>{ setExpandedSearch(new Set()); }, [searchQuery]);

  const products = pest ? cropRows.filter(r=>r.적용병해충===pest) : [];

  const mixIndex = useMemo(()=>{
    const idx = new Map();
    const add = (key, entry) => {
      if(!idx.has(key)) idx.set(key, []);
      idx.get(key).push(entry);
    };
    mixData.forEach(m=>{
      add(baseName(m.A), m);
      if(baseName(m.B) !== baseName(m.A)) add(baseName(m.B), m);
    });
    return idx;
  }, [mixData]);

  const comboMatches = useMemo(()=>{
    if(!comboPestA || !comboPestB) return [];
    const rowsA = (comboPestGroups.find(([n])=>n===comboPestA)||[null,[]])[1]
      .filter(r=> Number(r.재고_수량)>0);
    const rowsB = (comboPestGroups.find(([n])=>n===comboPestB)||[null,[]])[1]
      .filter(r=> Number(r.재고_수량)>0);
    const namesA = [...new Set(rowsA.map(r=>r.재고_품명))];
    const namesB = [...new Set(rowsB.map(r=>r.재고_품명))];
    const results = [];
    const seen = new Set();
    namesA.forEach(a=>{
      namesB.forEach(b=>{
        if(a===b) return;
        const baseA = baseName(a), baseB = baseName(b);
        const key = [baseA, baseB].sort().join('|');
        if(seen.has(key)) return;
        const candidates = mixIndex.get(baseA) || [];
        const hits = candidates.filter(m=>
          (m.status==='가능' || m.status==='제한적가능') &&
          ((baseName(m.A)===baseA && baseName(m.B)===baseB) ||
           (baseName(m.A)===baseB && baseName(m.B)===baseA)));
        if(hits.length===0) return;
        const sameCropHit = hits.find(h=>h.crop===comboCrop);
        const hit = sameCropHit || hits[0];
        const otherCrops = [...new Set(hits.map(h=>h.crop))];
        seen.add(key);
        const rowA = rowsA.find(r=>r.재고_품명===a);
        const rowB = rowsB.find(r=>r.재고_품명===b);
        results.push({
          a, b, rowA, rowB, status: hit.status, note: hit.note,
          sameCrop: !!sameCropHit, crops: otherCrops,
        });
      });
    });
    return results.sort((x,y)=> (y.sameCrop - x.sameCrop));
  }, [comboPestA, comboPestB, comboPestGroups, mixIndex, comboCrop]);

  function getPartnerTargets(partnerBase, cropGroup){
    const rows = registryIndex.exact.get(partnerBase)
      || registryIndex.exact.get((registryIndex.normMap.get(norm(partnerBase))||[])[0])
      || [];
    const forCrop = rows.filter(r=>r.작물그룹===cropGroup);
    const pests = [...new Set(forCrop.map(r=>r.적용병해충))];
    const usage = [...new Set((forCrop.length?forCrop:rows).map(r=>r.용도))];
    return {pests, usage};
  }

  function getMixInfo(productName, cropGroup){
    const useCrop = cropGroup || crop;
    const target = baseName(productName);
    const candidates = mixIndex.get(target) || [];
    const raw = candidates
      .map(m => {
        const partnerRaw = baseName(m.A)===target ? m.B : m.A;
        const partnerBase = baseName(partnerRaw);
        const formMatch = partnerRaw.match(/[\(（](.*?)[\)）]\s*$/);
        const {pests, usage} = getPartnerTargets(partnerBase, m.crop);
        return {
          partner: partnerBase,
          form: formMatch ? formMatch[1] : '',
          status: m.status, note: m.note,
          crop: m.crop, sameCrop: m.crop===useCrop,
          pests, usage,
        };
      });
    // 같은 파트너+판정이면 작물끼리 묶어서 표시 (예: "콩, 참깨 기준")
    const merged = new Map();
    raw.forEach(item=>{
      const key = item.partner + '|' + item.status;
      if(!merged.has(key)){
        merged.set(key, {...item, crops: [item.crop], sameCrop: item.sameCrop});
      } else {
        const ex = merged.get(key);
        if(!ex.crops.includes(item.crop)) ex.crops.push(item.crop);
        if(item.sameCrop) ex.sameCrop = true;
        // 현재 작물 기준 데이터가 있으면 병해충/용도 정보를 그쪽으로 갱신
        if(item.sameCrop){ ex.pests = item.pests; ex.usage = item.usage; }
      }
    });
    return [...merged.values()].sort((a,b)=> (b.sameCrop - a.sameCrop));
  }

  function renderMixSection(productName, cropGroup, sectionId){
    const mixes = getMixInfo(productName, cropGroup);
    if(mixes.length===0) return null;
    const isOpen = expandedMix.has(sectionId);
    const order = ['가능','제한적가능','불가'];
    const dotColor = {'가능':'#16A34A','제한적가능':'#D97706','불가':'#DC2626'};
    const groups = order
      .map(status => ({status, items: mixes.filter(m=>m.status===status)}))
      .filter(g => g.items.length>0);
    const others = mixes.filter(m=> !order.includes(m.status));
    if(others.length>0) groups.push({status:'기타', items:others});
    groups.forEach(g=>{
      g.items = [...g.items].sort((a,b)=>{
        const stockA = stockSet.has(a.partner) ? 0 : 1;
        const stockB = stockSet.has(b.partner) ? 0 : 1;
        if(stockA !== stockB) return stockA - stockB;
        return (b.sameCrop - a.sameCrop);
      });
    });
    return (
      <div className="mix-section">
        <button className="detail-toggle" onClick={()=>toggleExpanded(setExpandedMix, sectionId)}>
          {isOpen ? '혼용가능정보 숨기기 ▴' : `혼용가능정보 보기 (${mixes.length}건) ▾`}
        </button>
        {isOpen && (
        <>
        <div className="mix-section-label">혼용가능정보 (전체 작물 통합, {cropGroup} 기준 우선 표시)</div>
        <div style={{fontSize:11.5, color:'var(--ink-soft)', marginBottom:8, marginTop:-4}}>
          🟢 재고O+{cropGroup} 등록 &nbsp; 🔵 재고O+다른작물 등록 &nbsp; ⚪ 재고X
        </div>
        {groups.map(g=>{
          const inStockCount = g.items.filter(m=>stockSet.has(m.partner)).length;
          return (
          <div className="mix-group" key={g.status}>
            <div className="mix-group-head">
              <span className="dot" style={{background:dotColor[g.status]||'#999'}}></span>
              <span className="label">{g.status} ({g.items.length})</span>
              {inStockCount>0 && <span className="tag ok" style={{marginLeft:6, fontSize:11}}>재고 보유 {inStockCount}개 · 바로 적용 가능</span>}
            </div>
            <div className="mix-items">
              {g.items.map((m,mi)=>{
                const inStock = stockSet.has(m.partner);
                const stockClass = inStock ? (m.sameCrop ? 'instock' : 'instock-other') : '';
                return (
                  <div className={`mix-item ${stockClass}`} key={mi}>
                    <div className="mix-item-top">
                      {inStock && <span className="stock-dot"></span>}
                      <span className="mix-name">{m.partner}</span>
                      {m.form && <span className="mix-form">{m.form}</span>}
                      {m.usage.length>0 && <span className="mix-usage">{m.usage.join('/')}</span>}
                      <span className="mix-usage" style={m.sameCrop
                        ? {background:'var(--success-soft)', color:'#166534'}
                        : {background:'#F1F5F9', color:'#475569'}}>
                        {m.crops.join('·')} 기준{!m.sameCrop ? ' (다른 작물)' : ''}
                      </span>
                    </div>
                    {m.pests.length>0 && (
                      <div className="mix-targets">
                        {m.crops.join('·')} 적용: {m.pests.slice(0,3).join(', ')}{m.pests.length>3 ? ` 외 ${m.pests.length-3}건` : ''}
                      </div>
                    )}
                    {m.note && <div className="mix-note">{m.note}</div>}
                  </div>
                );
              })}
            </div>
          </div>
          );
        })}
        </>
        )}
      </div>
    );
  }

  return (
    <div className="wrap">
      <div className="topbar">
        <div className="brand">

                <b>{crop} · {pest}</b>에 쓸 수 있는 재고가 없습니다.
              </div>
              <div className="desc" style={{marginBottom:10}}>
                대신 정부 농약등록정보 기준으로 이 병해충에 등록된 농약 목록입니다 (재고 미보유, 참고용).
              </div>
              {(allPestEntries.find(e=>e.name===pest)?.registryRows || []).map((r, i)=>(
                <div className="prod-card" key={i}>
                  <div className="prod-head">
                    <div>
                      <div className="prod-name">{r.상표명}</div>
                      <div className="prod-spec">{r.일반명 || ''}</div>
                      <MoaBadge value={r.작용기작}/>
                    </div>
                  </div>
                  <div className="grid2" style={{marginTop:8}}>
                    <div><b>인축독성</b> {r.인축독성 || '-'}</div>
                    <div><b>희석배수</b> {r.희석배수 || '-'}</div>
                    <div><b>사용량</b> {r.사용량 || '-'}</div>
                    <div><b>사용적기</b> {r.사용적기 || '-'}</div>
                    <div className="caution-field"><b>안전사용시기</b> {r.안전사용시기 || '-'}</div>
                    <div className="caution-field"><b>안전사용횟수</b> {r.안전사용횟수 || '-'}</div>
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <div className="card">
              <h2>{pest} 방제 가능 농약</h2>
              <div className="desc">{crop} · {pest} 기준으로 우리 창고에 있는 농약입니다.</div>
              {products.map((p, i)=>(
                <div className="prod-card" key={i}>
                  <div className="prod-head">
                    <div>
                      <div className="prod-name">
                        {p.재고_품명}
                        {p.작물명 !== crop && <span className="crop-tag">{p.작물명}</span>}
                      </div>
                      <div className="prod-spec">{p.재고_규격} · {p.일반명 || ''}</div>
                      <MoaBadge value={p.작용기작}/>
                    </div>
                    <StockBadge qty={Number(p.재고_수량)||0} unit={p.재고_단위}/>
                  </div>
                  <button className="detail-toggle" onClick={()=>toggleExpanded(setExpandedPest, i)}>
                    {expandedPest.has(i) ? '간단히 ▴' : '사용법 자세히 보기 ▾'}
                  </button>
                  {expandedPest.has(i) && (
                    <div className="grid2" style={{marginTop:8}}>
                      <div><b>보관장소</b> {p.재고_보관장소 || '-'}</div>
                      <div><b>인축독성</b> {p.인축독성 || '-'}</div>
                      <div style={{gridColumn:'1 / -1', fontSize:14, fontWeight:800, color:moaStyle(p.작용기작).color}}><b>작용기작</b> {p.작용기작 || '-'}</div>
                      <div><b>희석배수</b> {p.희석배수 || '-'}</div>
                      <div><b>사용량</b> {p.사용량 || '-'}</div>
                      <div><b>사용적기</b> {p.사용적기 || '-'}</div>
                      <div><b>사용방법</b> {p.사용방법 || '-'}</div>
                      <div className="caution-field"><b>안전사용시기</b> {p.안전사용시기 || '-'}</div>
                      <div className="caution-field"><b>안전사용횟수</b> {p.안전사용횟수 || '-'}</div>
                    </div>
                  )}
                  {renderMixSection(p.재고_품명, crop, `pest-${i}`)}
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
      )}

      {toast && <Toast msg={toast} onDone={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
